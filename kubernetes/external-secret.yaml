apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentication-secrets-external
  namespace: microservices
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: authentication-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: taskmanager/db
        property: password
    - secretKey: JWT_SECRET
      remoteRef:
        key: taskmanager/app
        property: jwt_secret
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: taskmanager/google
        property: client_id
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: taskmanager/google
        property: client_secret
    - secretKey: INTERNAL_API_KEY
      remoteRef:
        key: taskmanager/app
        property: internal_api_key
